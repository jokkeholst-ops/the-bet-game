<style>
  body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; }
  select option { background: #1e1b4b; }
  * { box-sizing: border-box; }

  .page { min-height: 100vh; padding: 1rem 1rem 2.5rem; }
  .col { display: flex; flex-direction: column; gap: 1.25rem; max-width: 28rem; margin: 0 auto; padding-top: 1.5rem; }
  .col-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; text-align: center; padding: 1rem; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .row { display: flex; align-items: center; gap: 0.5rem; }

  .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); border-radius: 1rem; padding: 1.25rem; }
  .card-green  { border-color: #34d399; }
  .card-yellow { border-color: rgba(234,179,8,0.6); }
  .card-orange { border-color: rgba(251,146,60,0.6); }
  .card-red    { border-color: #f87171; }

  .btn { font-weight: 700; border-radius: 0.75rem; border: none; cursor: pointer; font-size: 1rem; padding: 0.75rem 1.25rem; display: inline-flex; align-items: center; justify-content: center; transition: opacity 0.15s, transform 0.1s; font-family: inherit; }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm  { font-size: 0.85rem; padding: 0.4rem 0.8rem; }
  .btn-full { width: 100%; }
  .btn-indigo { background: #4f46e5; color: white; } .btn-indigo:hover:not(:disabled) { background: #6366f1; }
  .btn-green  { background: #059669; color: white; } .btn-green:hover:not(:disabled)  { background: #10b981; }
  .btn-red    { background: #dc2626; color: white; } .btn-red:hover:not(:disabled)    { background: #ef4444; }
  .btn-yellow { background: #eab308; color: #000;  } .btn-yellow:hover:not(:disabled) { background: #facc15; }
  .btn-gray   { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.25); } .btn-gray:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
  .btn-rose   { background: #9f1239; color: white; } .btn-rose:hover:not(:disabled)   { background: #be123c; }

  .inp { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); border-radius: 0.75rem; padding: 0.55rem 1rem; color: white; outline: none; width: 100%; font-size: 1rem; font-family: inherit; }
  .inp::placeholder { color: rgba(255,255,255,0.38); }
  .inp:focus { border-color: #818cf8; }
  .sel { background: #1e1b4b; border: 1px solid rgba(255,255,255,0.25); border-radius: 0.75rem; padding: 0.55rem 1rem; color: white; width: 100%; font-size: 1rem; outline: none; font-family: inherit; }

  .label { color: rgba(255,255,255,0.5); font-size: 0.78rem; margin-bottom: 0.3rem; display: block; }
  .muted { color: rgba(255,255,255,0.6); font-size: 0.875rem; }
  .c-indigo  { color: #a5b4fc; }
  .c-yellow  { color: #fde047; }
  .c-green   { color: #6ee7b7; }
  .c-orange  { color: #fdba74; }
  .c-red     { color: #fca5a5; }
  .c-muted   { color: rgba(255,255,255,0.3); }
  .c-white   { color: white; }

  .badge { font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 9999px; }
  .badge-a { background: #1d4ed8; color: white; }
  .badge-b { background: #dc2626; color: white; }

  .timer { font-size: 2.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }
  .timer-green  { color: #34d399; }
  .timer-yellow { color: #fde047; }
  .timer-red    { color: #f87171; }

  .pill { padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: 9999px; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); cursor: pointer; background: transparent; transition: all 0.15s; font-family: inherit; }
  .pill:hover { border-color: rgba(255,255,255,0.5); }
  .pill-active { background: #4f46e5; border-color: #818cf8; color: white; }

  .dot-green { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: #34d399; display: inline-block; flex-shrink: 0; }
  .bet-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; }
  .wager-num { font-size: 1.5rem; font-weight: 900; width: 3.5rem; text-align: center; }
  .code-text { font-size: 1.875rem; font-weight: 900; letter-spacing: 0.2em; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1.5rem; }
  .overlay-card { max-width: 24rem; width: 100%; text-align: center; }
  .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.35rem; }
  .rm-btn { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 1rem; padding: 0 0.25rem; line-height: 1; }
  .rm-btn:hover { color: #f87171; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* spacing utils */
  .mt1{margin-top:0.25rem}.mt2{margin-top:0.5rem}.mt3{margin-top:0.75rem}.mt4{margin-top:1rem}
  .mb1{margin-bottom:0.25rem}.mb2{margin-bottom:0.5rem}.mb3{margin-bottom:0.75rem}.mb4{margin-bottom:1rem}
  .gap2{gap:0.5rem}.gap3{gap:0.75rem}.gap4{gap:1rem}
  .flex{display:flex}.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
  .items-center{align-items:center}.items-start{align-items:flex-start}
  .justify-center{justify-content:center}
  .w-full{width:100%}.text-center{text-align:center}
  .font-bold{font-weight:700}.font-black{font-weight:900}.font-semibold{font-weight:600}
  .text-xs{font-size:0.75rem}.text-sm{font-size:0.875rem}.text-lg{font-size:1.125rem}
  .text-xl{font-size:1.25rem}.text-2xl{font-size:1.5rem}.text-3xl{font-size:1.875rem}
  .text-4xl{font-size:2.25rem}.text-5xl{font-size:3rem}
  .italic{font-style:italic}
  .shrink-0{flex-shrink:0}
  .result-card-green { background: rgba(52,211,153,0.1); border: 1px solid #34d399; border-radius:1rem; padding:1rem; }
  .result-card-red   { background: rgba(248,113,113,0.1); border: 1px solid #f87171; border-radius:1rem; padding:1rem; }
  .highlight-row { background: rgba(79,70,229,0.25); border: 1px solid rgba(129,140,248,0.4); border-radius:0.5rem; }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Aliases ───────────────────────────────────────────────────
const h = React.createElement;
const { useState, useEffect, useRef, useCallback } = React;

// Build marker
const APP_BUILD = "v6.0.0";
console.log("Bet Game build", APP_BUILD);

// ── Firebase ──────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyC4nebdvhGrJgUpnUuC3ZeTBKyFRhVju_8",
  authDomain: "the-bet-game.firebaseapp.com",
  databaseURL: "https://the-bet-game-default-rtdb.firebaseio.com",
  projectId: "the-bet-game",
  storageBucket: "the-bet-game.firebasestorage.app",
  messagingSenderId: "774165159243",
  appId: "1:774165159243:web:f8bcd120572dbb1d1c9cce"
});
const db = firebase.database();
async function saveRoom(code, data) { await db.ref(`rooms/${code}`).set(data); }
function subscribeRoom(code, cb) {
  const r = db.ref(`rooms/${code}`);
  r.on("value", s => { if (s.exists()) cb(s.val()); });
  return () => r.off();
}
async function loadRoom(code) {
  const s = await db.ref(`rooms/${code}`).get();
  return s.exists() ? s.val() : null;
}

// ── Constants ─────────────────────────────────────────────────
const SIPS = 14;
const LIKELIHOOD_OPTIONS = ["Very Unlikely", "Unlikely", "Neutral", "Likely", "Very Likely"];
const ODDS_MAP = { "Very Unlikely": 2.5, "Unlikely": 1.5, "Neutral": 1, "Likely": 0.75, "Very Likely": 0.4 };

function genCode(n=5) { return Math.random().toString(36).substring(2,2+n).toUpperCase(); }
function sipsToDrinks(sips) {
  const abs=Math.abs(sips), sign=sips<0?"-":"", d=Math.floor(abs/SIPS), r=abs%SIPS;
  if(d&&r) return `${sign}${d} drink${d>1?"s":""}+${r} sip${r!==1?"s":""}`;
  if(d) return `${sign}${d} drink${d>1?"s":""}`;
  return `${sign}${r} sip${r!==1?"s":""}`;
}
function computeOdds(betId, bets, votes, players) {
  const bet=bets.find(b=>b.id===betId); if(!bet) return 1;
  const voters=players.filter(p=>p.group===bet.group); if(!voters.length) return 1;
  const total=voters.reduce((s,p)=>s+(ODDS_MAP[(votes[p.name]||{})[betId]]||1),0);
  return Math.round((total/voters.length)*100)/100;
}

// ── Primitives ────────────────────────────────────────────────
function Btn({onClick,children,color="indigo",disabled,sm,full}) {
  return h("button",{
    className:`btn btn-${color}${sm?" btn-sm":""}${full?" btn-full":""}`,
    onClick,disabled
  },children);
}
function Card({children,className=""}) {
  return h("div",{className:`card ${className}`},children);
}
function Inp({value,onChange,placeholder,style}) {
  return h("input",{className:"inp",value,placeholder,style,onChange:e=>onChange(e.target.value)});
}
function Sel({value,onChange,options}) {
  return h("select",{className:"sel",value,onChange:e=>onChange(e.target.value)},
    options.map(o=>h("option",{key:o,value:o},o)));
}

// ── Popups ────────────────────────────────────────────────────
function VerifyPopup({bet,room,myName,onClose}) {
  const outcomes = bet.outcomes || {};
  const mine = outcomes[myName] || {give:0, drink:0};

  const headline = "Bet hit!";
  const didLine = `${bet.target} did:`;
  const actionLine = bet.text;

  return h("div",{className:"overlay"},
    h(Card,{className:"overlay-card card-green"},
      h("div",{className:"text-5xl mb3"},"✅"),
      h("p",{className:"font-black text-xl mb2 c-green"},headline),

      h("p",{className:"c-indigo font-semibold mb1"},didLine),
      h("p",{className:"mb3"},actionLine),

      mine.give>0 && h("p",{className:"font-black c-yellow mb3"},`You can now hand out ${mine.give} sip${mine.give!==1?"s":""}.`),
      mine.drink>0 && h("p",{className:"font-black c-red mb3"},`You drink ${mine.drink} sip${mine.drink!==1?"s":""}.`),
      (mine.give===0 && mine.drink===0) && h("p",{className:"muted mb3"},"No action for you on this one."),

      h(Btn,{onClick:onClose,color:"green",full:true},"Got it!")
    )
  );
}


// ── Landing ───────────────────────────────────────────────────
function Landing({onHost,onJoin}) {
  const [code,setCode]=useState("");
  return h("div",{className:"col-center"},
    h("div",{className:"text-5xl"},"🍺"),
    h("h1",{className:"font-black",style:{fontSize:"2.2rem",letterSpacing:"-0.02em",margin:"0"}},"The Bet Game"),
    h("p",{className:"muted",style:{maxWidth:"18rem"}},"A party drinking game where you bet on what the other team will do."),
    h("div",{className:"flex flex-col gap3 w-full",style:{maxWidth:"20rem"}},
      h(Btn,{onClick:onHost,color:"indigo",full:true},"Host a Game"),
      h("div",{className:"flex gap2"},
        h(Inp,{value:code,onChange:v=>setCode(v.toUpperCase()),placeholder:"Room code"}),
        h(Btn,{onClick:()=>onJoin(code),color:"gray",sm:true},"Join")
      )
    )
  );
}

// ── Host Setup ────────────────────────────────────────────────
function HostSetup({onStart}) {
  const [name,setName]=useState(""), [minutes,setMinutes]=useState(20);
  const [maxTotal,setMaxTotal]=useState("14");
  const [noLimit,setNoLimit]=useState(false);
  const code=useRef(genCode()).current;
  const start=async()=>{
    if(!name.trim()) return;
    const room={code,phase:"lobby",hostName:name.trim(),timerMinutes:minutes,
      maxWagerTotal:(noLimit?null: (parseInt(maxTotal||"14",10)||14)),
      players:[{name:name.trim(),group:null,id:genCode()}],
      bets:[],votes:{},wagers:{},oddsMap:{},verifiedBets:[],expiredBets:[],
      drinkTotals:{},giveTotals:{},timerEnd:null,guessLog:[],activeBets:[],
      lastGuessResult:null,lastVerifiedBet:null,shortWins:[]};
    await saveRoom(code,room); onStart(room,name.trim());
  };
  return h("div",{className:"col"},
    h("h2",{className:"text-2xl font-bold"},"Host Setup"),
    h(Card,{},
      h("span",{className:"label"},"Your name"),
      h(Inp,{value:name,onChange:setName,placeholder:"Enter your name"})
    ),
    h(Card,{},
      h("span",{className:"label"},"Timer (minutes)"),
      h("div",{className:"flex items-center gap4"},
        h(Btn,{onClick:()=>setMinutes(m=>Math.max(5,m-5)),color:"gray",sm:true},"−"),
        h("span",{className:"font-black text-3xl",style:{width:"3rem",textAlign:"center"}},minutes),
        h(Btn,{onClick:()=>setMinutes(m=>m+5),color:"gray",sm:true},"+")
      )

    ),
    h(Card,{},
      h("span",{className:"label"},"Max total wager per player (sum of abs wagers)"),
      h("div",{className:"flex items-center gap3"},
        h(Btn,{onClick:()=>setNoLimit(v=>!v),color:noLimit?"green":"gray",sm:true},noLimit?"No limit":"Set limit"),
        !noLimit && h(Inp,{value:maxTotal,onChange:setMaxTotal,placeholder:"14",style:{maxWidth:"6rem"}}),
        !noLimit && h("span",{className:"muted text-sm"},"sips")
      ),
      h("p",{className:"muted text-xs mt2"},"Counts both longs and shorts using absolute value. Per-bet max is still 14.")
    ),
    h(Btn,{onClick:start,color:"green",full:true},"Create Room")
  );
}

// ── Lobby ─────────────────────────────────────────────────────
function Lobby({room,myName,isHost,onRoomUpdate}) {
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(room.code);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const removePlayer=async name=>{
    if(!window.confirm(`Remove ${name}?`)) return;
    const u={...room,players:room.players.filter(p=>p.name!==name),bets:(room.bets||[]).filter(b=>b.author!==name)};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  const startGame=async()=>{
    if(room.players.length<2){alert("Need at least 2 players.");return;}
    const sh=[...room.players].sort(()=>Math.random()-0.5);
    const half=Math.ceil(sh.length/2);
    const u={...room,phase:"betting",players:sh.map((p,i)=>({...p,group:i<half?"A":"B"}))};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  return h("div",{className:"col"},
    h(Card,{className:"row-between"},
      h("div",{},
        h("span",{className:"label"},"Room Code"),
        h("p",{className:"code-text",style:{margin:0}},room.code)
      ),
      h(Btn,{onClick:copy,color:"gray",sm:true},copied?"Copied!":"Copy")
    ),
    h(Card,{},
      h("p",{className:"muted mb3"},`Players (${room.players.length})`),
      h("div",{className:"flex flex-col gap2"},
        ...room.players.map(p=>h("div",{key:p.id,className:"row-between"},
          h("div",{className:"flex items-center gap2"},
            h("span",{className:"dot-green"}),
            h("span",{},`${p.name}${p.name===room.hostName?" 👑":""}`)
          ),
          isHost&&p.name!==myName&&h(Btn,{onClick:()=>removePlayer(p.name),color:"rose",sm:true},"Remove")
        ))
      )
    ),
    h("p",{className:"muted text-center"},`Timer: ${room.timerMinutes} min · ${SIPS} sips = 1 drink`),
    isHost
      ? h(Btn,{onClick:startGame,color:"green",full:true},"Split Groups & Start Betting")
      : h("p",{className:"muted text-center pulse"},"Waiting for host to start…")
  );
}

// ── Betting ───────────────────────────────────────────────────
function BettingPhase({room,myName,isHost,onRoomUpdate}) {
  const me=room.players.find(p=>p.name===myName);
  const myGroup=me?.group;
  const others=room.players.filter(p=>p.group!==myGroup);
  const myBets=(room.bets||[]).filter(b=>b.author===myName);
  const locked=myBets.some(b=>b.locked);
  const [betText,setBetText]=useState(""), [target,setTarget]=useState(others[0]?.name||"");

  const removePlayer=async name=>{
    if(!window.confirm(`Remove ${name}? Their bets will also be removed.`)) return;
    const u={...room,players:room.players.filter(p=>p.name!==name),bets:(room.bets||[]).filter(b=>b.author!==name)};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  const addBet=async()=>{
    if(!betText.trim()||myBets.length>=5||locked) return;
    const nb={id:genCode(),author:myName,group:myGroup,target,text:betText.trim(),locked:false};
    const u={...room,bets:[...(room.bets||[]),nb]};
    await saveRoom(room.code,u); onRoomUpdate(u); setBetText("");
  };
  const removeBet=async id=>{
    const u={...room,bets:room.bets.filter(b=>b.id!==id)};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  const lockBets=async()=>{
    if(myBets.length===0){alert("Add at least 1 bet first.");return;}
    const u={...room,bets:room.bets.map(b=>b.author===myName?{...b,locked:true}:b)};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  const allLocked=room.players.every(p=>(room.bets||[]).some(b=>b.author===p.name&&b.locked));
  const startVoting=async()=>{const u={...room,phase:"voting"};await saveRoom(room.code,u);onRoomUpdate(u);};

  return h("div",{className:"col"},
    h("div",{className:"row-between"},
      h("h2",{className:"text-xl font-bold"},"Betting Phase"),
      h("span",{className:`badge ${myGroup==="A"?"badge-a":"badge-b"}`},myGroup==="A"?"🔵 Group A":"🔴 Group B")
    ),
    h(Card,{},
      h("p",{className:"muted text-sm mb1"},`Your group: ${room.players.filter(p=>p.group===myGroup).map(p=>p.name).join(", ")}`),
      h("p",{className:"muted text-sm"},`Other group: ${others.map(p=>p.name).join(", ")}`)
    ),
    !locked&&h(Card,{},
      h("p",{className:"font-semibold mb3"},`Write a bet (${myBets.length}/5)`),
      h("span",{className:"label"},"Bet about:"),
      h(Sel,{value:target,onChange:setTarget,options:others.map(p=>p.name)}),
      h("div",{className:"mt3"},h(Inp,{value:betText,onChange:setBetText,placeholder:`e.g. ${target} will spill their drink`})),
      h("div",{className:"flex gap2 mt3"},
        h(Btn,{onClick:addBet,color:"indigo",sm:true,disabled:myBets.length>=5||!betText.trim()},"Add Bet"),
        myBets.length>0&&h(Btn,{onClick:lockBets,color:"green",sm:true},"Lock In")
      )
    ),
    myBets.length>0&&h(Card,{},
      locked&&h("p",{className:"font-bold mb3 c-green"},"✓ Bets locked in!"),
      h("div",{className:"flex flex-col gap2"},
        ...myBets.map(b=>h("div",{key:b.id,className:"bet-row"},
          h("span",{},h("span",{className:"c-indigo font-semibold"},`${b.target}: `),b.text),
          !locked&&h("button",{onClick:()=>removeBet(b.id),className:"rm-btn shrink-0"},"✕")
        ))
      )
    ),
    h(Card,{},
      h("p",{className:"muted mb2"},"Player status:"),
      h("div",{className:"flex flex-col"},
        ...room.players.map(p=>{
          const pl=(room.bets||[]).some(b=>b.author===p.name&&b.locked);
          return h("div",{key:p.name,className:"status-row"},
            h("div",{className:"flex items-center gap2"},
              h("span",{style:{color:pl?"#34d399":"rgba(255,255,255,0.3)"}},pl?"✓":"○"),
              h("span",{style:{color:pl?"white":"rgba(255,255,255,0.4)"}},p.name)
            ),
            isHost&&p.name!==myName&&h(Btn,{onClick:()=>removePlayer(p.name),color:"rose",sm:true},"Remove")
          );
        })
      )
    ),
    allLocked&&isHost&&h(Btn,{onClick:startVoting,color:"yellow",full:true},"Everyone's In — Start Voting")
  );
}

// ── Voting ────────────────────────────────────────────────────
function VotingPhase({room,myName,isHost,onRoomUpdate}) {
  const me=room.players.find(p=>p.name===myName);
  const myGroup=me?.group;
  const myGroupBets=(room.bets||[]).filter(b=>b.group===myGroup&&b.locked);
  const myVotes=(room.votes||{})[myName]||{};

  const vote=async(betId,l)=>{
    const u={...room,votes:{...(room.votes||{}),[myName]:{...myVotes,[betId]:l}}};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  const everyoneVoted=room.players.every(p=>{
    const gb=(room.bets||[]).filter(b=>b.group===p.group&&b.locked);
    return gb.every(b=>((room.votes||{})[p.name]||{})[b.id]);
  });
  const startWagering=async()=>{
    const oddsMap={};
    (room.bets||[]).filter(b=>b.locked).forEach(b=>{oddsMap[b.id]=computeOdds(b.id,room.bets,room.votes||{},room.players);});
    const u={...room,phase:"wagering",oddsMap}; await saveRoom(room.code,u); onRoomUpdate(u);
  };

  return h("div",{className:"col"},
    h("h2",{className:"text-xl font-bold"},"Vote on Your Bets"),
    h("p",{className:"muted"},"Rate how likely each of your group's bets are. This sets the odds."),
    myGroupBets.length===0&&h("p",{className:"muted italic"},"No bets to vote on."),
    ...myGroupBets.map(b=>h(Card,{key:b.id},
      h("p",{className:"c-indigo font-semibold text-sm mb1"},b.target),
      h("p",{className:"mb3"},b.text),
      h("span",{className:"label"},"How likely?"),
      h("div",{className:"flex flex-wrap gap2 mt1"},
        ...LIKELIHOOD_OPTIONS.map(l=>h("button",{
          key:l, onClick:()=>vote(b.id,l),
          className:`pill${myVotes[b.id]===l?" pill-active":""}`
        },l))
      )
    )),
    h(Card,{},
      h("p",{className:"muted mb2"},"Waiting for votes…"),
      ...room.players.map(p=>{
        const gb=(room.bets||[]).filter(b=>b.group===p.group&&b.locked);
        const done=gb.every(b=>((room.votes||{})[p.name]||{})[b.id]);
        return h("div",{key:p.name,className:"flex items-center gap2 mb1"},
          h("span",{style:{color:done?"#34d399":"rgba(255,255,255,0.3)"}},done?"✓":"○"),
          h("span",{style:{color:done?"white":"rgba(255,255,255,0.4)"}},p.name)
        );
      })
    ),
    everyoneVoted&&isHost&&h(Btn,{onClick:startWagering,color:"yellow",full:true},"All Votes In — Set Wagers")
  );
}

// ── Wagering ──────────────────────────────────────────────────
function WageringPhase({room,myName,isHost,onRoomUpdate}) {
  const me=room.players.find(p=>p.name===myName);
  const myGroup=me?.group;
  const groupBets=(room.bets||[]).filter(b=>b.group===myGroup&&b.locked);
  const existing=(room.wagers||{})[myName]||{};
  const [wagers,setWagers]=useState(()=>{const w={};groupBets.forEach(b=>{w[b.id]=existing[b.id]??0;});return w;});
  const saved=Object.keys((room.wagers||{})[myName]||{}).length>=groupBets.length&&groupBets.length>0;
  const MAX_WAGER_TOTAL = (room.maxWagerTotal===undefined ? 14 : room.maxWagerTotal); // null => no limit
  const setW=(id,val)=>setWagers(w=>{
    const old=Number(w[id]||0);
    let v=Math.max(-SIPS,Math.min(SIPS,Number(val||0))); // per-bet cap still 14

    if(MAX_WAGER_TOTAL===null){
      return {...w,[id]:v};
    }

    const usedTotal=Object.values(w).reduce((s,x)=>s+Math.abs(Number(x||0)),0);
    const base=usedTotal-Math.abs(old);
    const remaining=Math.max(0,MAX_WAGER_TOTAL-base);

    const sign=v<0?-1:1;
    const mag=Math.min(Math.abs(v),remaining);
    v = mag===0 ? 0 : sign*mag;

    return {...w,[id]:v};
  });
  const saveWagers=async()=>{
    const u={...room,wagers:{...(room.wagers||{}),[myName]:wagers}};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  const allWagered=room.players.every(p=>{
    const pb=(room.bets||[]).filter(b=>b.author===p.name&&b.locked);
    return pb.length===0||Object.keys((room.wagers||{})[p.name]||{}).length>=pb.length;
  });
  const startGame=async()=>{
    const timerEnd=Date.now()+room.timerMinutes*60*1000;
    const u={...room,phase:"live",timerEnd,activeBets:(room.bets||[]).filter(b=>b.locked).map(b=>b.id)};
    await saveRoom(room.code,u); onRoomUpdate(u);
  };

  return h("div",{className:"col"},
    h("h2",{className:"text-xl font-bold"},"Place Your Wagers"),
    h(Card,{className:"card-yellow"},
      h("p",{className:"font-semibold text-sm c-yellow"},"💡 Wager guide"),
      h("p",{className:"muted text-xs mt1"},"Positive = betting it WILL happen. Negative = shorting (betting it WON'T). 0 = sit it out."),
      h("p",{className:"muted text-xs mt1"}, (()=>{
        const cap=(room.maxWagerTotal===undefined?14:room.maxWagerTotal);
        if(cap===null) return "Max total wager: No limit · Remaining: ∞";
        const used=Object.values(wagers).reduce((s,x)=>s+Math.abs(Number(x||0)),0);
        const rem=Math.max(0,cap-used);
        return `Max total wager: ${cap} · Remaining: ${rem}`;
      })() )
    ),
    ...groupBets.map(b=>{
      const odds=(room.oddsMap||{})[b.id]??1, w=wagers[b.id]??0, isShort=w<0;
      return h(Card,{key:b.id,className:isShort?"card-orange":""},
        h("p",{className:"c-indigo font-semibold text-sm"},b.target),
        h("p",{className:"mb2"},b.text),
        h("p",{className:"c-yellow font-bold text-sm mb1"},`Odds: ${odds}x`),
        h("p",{className:`text-xs mb3 ${isShort?"c-orange":w===0?"muted":"c-green"}`},
          isShort?`📉 Shorting — if it doesn't happen, hand out ${Math.abs(w)} sips`
          :w===0?"No wager"
          :`📈 Long — hand out ${Math.round(w*odds)} sips`
        ),
        h("div",{className:"flex items-center gap3"},
          h(Btn,{onClick:()=>setW(b.id,w-1),color:"gray",sm:true,disabled:w<=-SIPS},"−"),
          h("span",{className:`wager-num ${isShort?"c-orange":w===0?"c-muted":"c-green"}`},w),
          h(Btn,{onClick:()=>setW(b.id,w+1),color:"gray",sm:true,disabled:w>=SIPS},"+")
        )
      );
    }),
    !saved&&h(Btn,{onClick:saveWagers,color:"green",full:true},"Save Wagers"),
    saved&&h("p",{className:"font-bold text-center c-green"},"✓ Wagers saved!"),
    h(Card,{},
      ...room.players.map(p=>{
        const pb=(room.bets||[]).filter(b=>b.author===p.name&&b.locked);
        const done=pb.length===0||Object.keys((room.wagers||{})[p.name]||{}).length>=pb.length;
        return h("div",{key:p.name,className:"flex items-center gap2 mb1"},
          h("span",{style:{color:done?"#34d399":"rgba(255,255,255,0.3)"}},done?"✓":"○"),
          h("span",{style:{color:done?"white":"rgba(255,255,255,0.4)"}},p.name)
        );
      })
    ),
    allWagered&&isHost&&h(Btn,{onClick:startGame,color:"red",full:true},"Start the Game! 🎉")
  );
}

// ── Live ──────────────────────────────────────────────────────
function LivePhase({room,myName,isHost,onRoomUpdate}) {
  const me=room.players.find(p=>p.name===myName);
  const myGroup=me?.group;
  const [timeLeft,setTimeLeft]=useState(Math.max(0,(room.timerEnd||0)-Date.now()));
  const [guessText,setGuessText]=useState(""), [showGuess,setShowGuess]=useState(false);
  const [verifyPopup,setVerifyPopup]=useState(null);
  const endedRef=useRef(false), lastVerifiedRef=useRef(null);

  useEffect(()=>{const iv=setInterval(()=>setTimeLeft(Math.max(0,(room.timerEnd||0)-Date.now())),1000);return()=>clearInterval(iv);},[room.timerEnd]);

  useEffect(()=>{
    const lv=room.lastVerifiedBet; if(!lv) return;
    if(lastVerifiedRef.current===lv.ts) return;
    lastVerifiedRef.current=lv.ts; setVerifyPopup(lv);
  },[room.lastVerifiedBet]);

  const activeBetIds=room.activeBets||[];
  const myGroupBets=(room.bets||[]).filter(b=>b.group===myGroup&&activeBetIds.includes(b.id));
  const fmt=ms=>{const s=Math.floor(ms/1000),m=Math.floor(s/60);return `${m}:${String(s%60).padStart(2,"0")}`;};

  const resolveBetVerified = (bet, r) => {
  const drinkTotals = { ...(r.drinkTotals || {}) };
  const giveTotals  = { ...(r.giveTotals  || {}) };
  const odds = (r.oddsMap || {})[bet.id] || 1;

  const outcomes = {}; // player -> { give, drink }

  r.players.forEach(p => {
    const w = (r.wagers || {})[p.name]?.[bet.id];
    if (!w) return;

    if (w > 0) {
      // Long hit -> hand out wager * odds (popup only)
      const g = Math.round(w * odds);
      outcomes[p.name] = { give: g, drink: 0 };
    } else {
      // Short hit -> drink |w| now (popup only)
      const d = Math.abs(w);
      outcomes[p.name] = { give: 0, drink: d };
    }
  });

  // IMPORTANT: no totals are changed here; end totals come only from expired bets
  return { drinkTotals, giveTotals, outcomes };
};

  const resolveBetExpired=(bet,r)=>{
    const drinkTotals={...(r.drinkTotals||{})};
    const giveTotals={...(r.giveTotals||{})};
    const outcomes={};

    r.players.forEach(p=>{
      const w=(r.wagers||{})[p.name]?.[bet.id];
      if(!w) return;

      if(w<0){
        // Short was RIGHT -> hand out |w| (no odds)
        const g=Math.abs(w);
        giveTotals[p.name]=(giveTotals[p.name]||0)+g;
        outcomes[p.name]={give:g,drink:0};
      } else {
        // Long was WRONG -> drink w
        const d=Math.abs(w);
        drinkTotals[p.name]=(drinkTotals[p.name]||0)+d;
        outcomes[p.name]={give:0,drink:d};
      }
    });

    return {drinkTotals,giveTotals,outcomes};
  };

  const endGame=useCallback(async()=>{
    if(endedRef.current) return; endedRef.current=true;
    const verifiedSet = new Set(room.verifiedBets||[]);
    const still=(room.bets||[]).filter(b=>(room.activeBets||[]).includes(b.id) && !verifiedSet.has(b.id));
    let drinkTotals={...(room.drinkTotals||{})};
    let giveTotals={...(room.giveTotals||{})};
    // Any still-active bets at timer end are treated as "expired" (did NOT happen)
    still.forEach(b=>{
      const res=resolveBetExpired(b,{...room,drinkTotals,giveTotals});
      drinkTotals=res.drinkTotals;
      giveTotals=res.giveTotals;
    });
    const u={...room,phase:"end",activeBets:[],
      expiredBets:[...(room.expiredBets||[]),...still.map(b=>b.id)],
      drinkTotals,giveTotals,
      lastVerifiedBet:null};
    await saveRoom(room.code,u); onRoomUpdate(u);
  },[room]);

  useEffect(()=>{if(timeLeft===0&&room.phase==="live"&&isHost) endGame();},[timeLeft]);

  const verifyBet=async bet=>{
    const res=resolveBetVerified(bet,room);
    const u={...room,
      activeBets:activeBetIds.filter(id=>id!==bet.id),
      verifiedBets:[...(room.verifiedBets||[]),bet.id],
      drinkTotals:res.drinkTotals,
      giveTotals:res.giveTotals,
      lastVerifiedBet:{
        id:bet.id,target:bet.target,text:bet.text,author:bet.author,
        outcomes:res.outcomes,
        ts:Date.now()
      }
    };
    await saveRoom(room.code,u); onRoomUpdate(u);
  };
  const submitGuess=async()=>{
    if(!guessText.trim()) return;
    const otherBets=(room.bets||[]).filter(b=>b.group!==myGroup&&activeBetIds.includes(b.id));
    const match=otherBets.find(b=>b.text.toLowerCase().includes(guessText.toLowerCase().trim())||guessText.toLowerCase().trim().includes(b.text.toLowerCase().substring(0,12)));
    const prev=room.drinkTotals||{};
    if(match){
      const wager=(room.wagers||{})[match.author]?.[match.id]||1;
      const u={...room,activeBets:activeBetIds.filter(id=>id!==match.id),expiredBets:[...(room.expiredBets||[]),match.id],
        drinkTotals:{...prev,[match.author]:(prev[match.author]||0)+wager},lastGuessResult:{guesser:myName,correct:true,give:10}};
      await saveRoom(room.code,u); onRoomUpdate(u);
    } else {
      const highest=Math.max(1,...otherBets.map(b=>Math.abs((room.wagers||{})[b.author]?.[b.id]||1)));
      const u={...room,drinkTotals:{...prev,[myName]:(prev[myName]||0)+highest},lastGuessResult:{guesser:myName,correct:false,penalty:highest}};
      await saveRoom(room.code,u); onRoomUpdate(u);
    }
    setGuessText(""); setShowGuess(false);
  };

  const tClass=timeLeft<60000?"timer timer-red":timeLeft<180000?"timer timer-yellow":"timer timer-green";
  const res=room.lastGuessResult;
  const otherActive=(room.bets||[]).filter(b=>b.group!==myGroup&&activeBetIds.includes(b.id));
  const highest=Math.max(1,...otherActive.map(b=>Math.abs((room.wagers||{})[b.author]?.[b.id]||1)));

  return h("div",{className:"col",style:{paddingTop:"1rem"}},
    verifyPopup&&h(VerifyPopup,{
      bet:verifyPopup,
      room,
      myName,
      onClose:()=>setVerifyPopup(null)
    }),
    h("div",{className:"row-between"},
      h("span",{className:tClass},fmt(timeLeft)),
      h("span",{className:`badge ${myGroup==="A"?"badge-a":"badge-b"}`},myGroup==="A"?"🔵 Group A":"🔴 Group B")
    ),
    res&&h("div",{className:res.correct?"result-card-green":"result-card-red"},
      res.correct
        ? h("p",{className:"font-bold c-green"},`✓ ${res.guesser} guessed correctly! They hand out 10 sips.`)
        : h("p",{className:"font-bold c-red"},`✗ ${res.guesser} guessed wrong — drinks ${res.penalty} sips!`)
    ),
    h("h3",{className:"font-bold",style:{color:"rgba(255,255,255,0.85)",margin:0}},"Your Group's Active Bets"),
    myGroupBets.length===0&&h("p",{className:"muted italic"},"No active bets."),
    ...myGroupBets.map(b=>{
      const odds=(room.oddsMap||{})[b.id]||1;
      const longs=room.players.filter(p=>((room.wagers||{})[p.name]?.[b.id]||0)>0);
      const shorts=room.players.filter(p=>((room.wagers||{})[p.name]?.[b.id]||0)<0);
      return h(Card,{key:b.id},
        h("div",{className:"row-between mb1"},
          h("p",{className:"c-indigo font-semibold text-sm",style:{margin:0}},b.target),
          h("span",{className:"c-yellow text-xs font-bold"},`${odds}x odds`)
        ),
        h("p",{className:"mb2 text-sm",style:{margin:"0 0 0.5rem"}},b.text),
        longs.length>0&&h("p",{className:"c-green text-xs mb1",style:{margin:"0 0 0.25rem"}},`📈 Long: ${longs.map(p=>`${p.name} (${(room.wagers||{})[p.name][b.id]})`).join(", ")}`),
        shorts.length>0&&h("p",{className:"c-orange text-xs mb2",style:{margin:"0 0 0.5rem"}},`📉 Short: ${shorts.map(p=>`${p.name} (${(room.wagers||{})[p.name][b.id]})`).join(", ")}`),
        h(Btn,{onClick:()=>verifyBet(b),color:"green",sm:true},"✓ Verify — It Happened!")
      );
    }),
    h(Btn,{onClick:()=>setShowGuess(!showGuess),color:"yellow",full:true},"🎯 Guess Their Bet"),
    showGuess&&h(Card,{},
      h("p",{className:"muted text-sm mb2"},"Type roughly what you think their bet says:"),
      h(Inp,{value:guessText,onChange:setGuessText,placeholder:"They bet that..."}),
      h("div",{className:"flex gap2 mt3"},
        h(Btn,{onClick:submitGuess,color:"indigo",sm:true},"Submit Guess"),
        h(Btn,{onClick:()=>setShowGuess(false),color:"gray",sm:true},"Cancel")
      ),
      h("p",{className:"c-red text-xs mt2"},`Wrong guess penalty: ${highest} sips`)
    ),
    isHost&&h(Btn,{onClick:endGame,color:"rose",sm:true},"End Game Early")
  );
}

// ── End ───────────────────────────────────────────────────────
function EndPhase({room,myName}) {
  const drinkTotals = room.drinkTotals || {};
  const giveTotals  = room.giveTotals  || {};
  const players = (room.players || []).map(p => p.name);

  const rows = players
    .map(name => ({
      name,
      give:  giveTotals[name]  || 0,
      drink: drinkTotals[name] || 0,
    }))
    .sort((a,b) => (b.drink - a.drink) || (b.give - a.give));

  const myGive  = giveTotals[myName]  || 0;
  const myDrink = drinkTotals[myName] || 0;

  const isHost = room.hostName === myName;

  const playAgain = async () => {
    const latest = await loadRoom(room.code);
    if(!latest) return;

    const reset = {
      ...latest,
      phase: "lobby",
      // reset game state
      bets: [],
      votes: {},
      wagers: {},
      oddsMap: {},
      activeBets: [],
      verifiedBets: [],
      expiredBets: [],
      drinkTotals: {},
      giveTotals: {},
      timerEnd: null,
      lastGuessResult: null,
      lastVerifiedBet: null
    };

    await saveRoom(latest.code, reset);
    // no need to location.reload; room subscription will update everyone automatically
  };

  return h("div",{className:"col"},
    h("div",{className:"text-center"},
      h("div",{className:"text-5xl mb2"},"🏁"),
      h("h2",{className:"font-black text-3xl",style:{margin:0}},"Game Over!"),
      h("p",{className:"muted",style:{marginTop:".5rem"}},
        `Your totals: Drink ${myDrink}, Hand out ${myGive}`
      )
    ),

    h(Card,{},
      h("p",{className:"font-black mb2"},"Final Totals"),
      h("div",{className:"flex flex-col gap2"},
        ...rows.map(r =>
          h("div",{key:r.name,className:"row-between"},
            h("div",null,r.name),
            h("div",{className:"row",style:{gap:"1rem"}},
              h("span",{className:"c-yellow font-bold"},`Hand out: ${r.give}`),
              h("span",{className:"c-red font-bold"},`Drink: ${r.drink}`)
            )
          )
        )
      )
    ),

    isHost && h(Btn,{onClick:playAgain,color:"green",full:true},"Play again"),
    h(Btn,{onClick:()=>location.reload(),color:"gray",full:true},"Exit to home")
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [screen,setScreen]=useState("landing");
  const [room,setRoom]=useState(null), [myName,setMyName]=useState("");
  const [joinCode,setJoinCode]=useState(""), [joinName,setJoinName]=useState(""), [joinError,setJoinError]=useState("");
  const unsubRef=useRef(null);

  const subscribe=useCallback(code=>{
    if(unsubRef.current) unsubRef.current();
    unsubRef.current=subscribeRoom(code,setRoom);
  },[]);
  useEffect(()=>()=>{if(unsubRef.current) unsubRef.current();},[]);

  const handleHost=(r,name)=>{setRoom(r);setMyName(name);setScreen("game");subscribe(r.code);};
  const handleJoinCode=async code=>{
    setJoinError(""); if(!code) return;
    const r=await loadRoom(code);
    if(!r){setJoinError("Room not found.");return;}
    setJoinCode(code);setRoom(r);setScreen("joining");
  };
  const confirmJoin=async()=>{
    if(!joinName.trim()) return;
    const r=await loadRoom(joinCode); if(!r){setJoinError("Room expired.");return;}
    const already=r.players.find(p=>p.name===joinName.trim());
    const updated=already?r:{...r,players:[...r.players,{name:joinName.trim(),group:null,id:genCode()}]};
    if(!already) await saveRoom(r.code,updated);
    setMyName(joinName.trim());setRoom(updated);setScreen("game");subscribe(updated.code);
  };

  if(screen==="landing") return h("div",{className:"page"},h(Landing,{onHost:()=>setScreen("hostSetup"),onJoin:handleJoinCode}));
  if(screen==="hostSetup") return h("div",{className:"page"},h(HostSetup,{onStart:handleHost}));
  if(screen==="joining") return h("div",{className:"page"},
    h("div",{className:"col-center"},
      h("h2",{className:"text-2xl font-bold"},`Joining Room ${joinCode}`),
      h(Inp,{value:joinName,onChange:setJoinName,placeholder:"Your name",style:{maxWidth:"20rem"}}),
      joinError&&h("p",{style:{color:"#f87171",fontSize:"0.875rem"}},joinError),
      h(Btn,{onClick:confirmJoin,color:"green"},"Join Game")
    )
  );
  if(!room) return null;

  const isHost=myName===room.hostName;
  const phases={
    lobby:h(Lobby,{room,myName,isHost,onRoomUpdate:setRoom}),
    betting:h(BettingPhase,{room,myName,isHost,onRoomUpdate:setRoom}),
    voting:h(VotingPhase,{room,myName,isHost,onRoomUpdate:setRoom}),
    wagering:h(WageringPhase,{room,myName,isHost,onRoomUpdate:setRoom}),
    live:h(LivePhase,{room,myName,isHost,onRoomUpdate:setRoom}),
    end:h(EndPhase,{room,myName}),
  };
  return h("div",{className:"page"},phases[room.phase]||h("p",{className:"muted text-center",style:{marginTop:"5rem"}},"Unknown phase"));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
